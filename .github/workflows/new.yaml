name: Minecraft Server with Local Playit
on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FINE_GRAINED_PAT }}
          ref: playit-only

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Playit Binary
        run: |
          chmod +x ./playit-linux-amd64

      - name: Run Server and Backup Loop
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          # Start Playit using the secret and the local binary
          # We pass the secret directly to the run command
          ./playit-linux-amd64 run --secret "$PLAYIT_SECRET" &

          # Start Minecraft (Adjust RAM to fit within GH Actions 7GB limit)
          java -Xmx6G -Xms6G -jar server.jar nogui &
          
          # Backup Loop (Every 60 minutes)
          while kill -0 $! 2>/dev/null; do
            sleep 3600
            echo "Performing scheduled hourly backup..."
            git config --local user.name "github-actions"
            git config --local user.email "github-actions@github.com"
            git add .
            git commit -m "Automated backup: $(date)" || echo "Nothing to commit"
            git push origin playit-only
          done

      - name: Final Commit on Shutdown
        if: always()
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "github-actions@github.com"
          git add .
          git commit -m "Final sync before workflow termination" || echo "Nothing to commit"
          git push origin playit-only
          
