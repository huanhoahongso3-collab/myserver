name: Minecraft Server with Playit
on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FINE_GRAINED_PAT }}
          ref: playit-only

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Adjust based on your Minecraft version
          distribution: 'temurin'

      - name: Install Playit.gg
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg > /dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data-benchmark ./ " | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update
          sudo apt install playit -y

      - name: Run Server and Backup Loop
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          # Start Playit in the background
          echo "$PLAYIT_SECRET" > playit.toml
          playit run &

          # Start Minecraft (Adjust Xmx/Xms for GitHub's 7GB RAM limit)
          java -Xmx6G -Xms6G -jar server.jar nogui &
          
          # Backup Loop (Every 60 minutes)
          while kill -0 $! 2>/dev/null; do
            sleep 3600
            echo "Performing scheduled backup..."
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"
            git add .
            git commit -m "Scheduled backup: $(date)" || echo "No changes to commit"
            git push origin playit-only
          done

      - name: Final Commit on Shutdown
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Final backup before shutdown" || echo "No changes to commit"
          git push origin playit-only
          
